<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập Quản trị - Mẹ Bỉm Thông Thái</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #ff6b8b;
            --primary-hover: #ff476e;
            --secondary: #4facfe;
            --text-main: #2d3748;
            --text-light: #718096;
            --bg-glass: rgba(255, 255, 255, 0.7);
            --bg-input: rgba(255, 255, 255, 0.9);
            --border-glass: rgba(255, 255, 255, 0.4);
            --shadow-glass: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            position: relative;
            overflow: hidden;
        }

        /* Animated Background Elements */
        .bg-shape {
            position: absolute;
            filter: blur(60px);
            z-index: 0;
            border-radius: 50%;
            animation: float 10s infinite ease-in-out alternate;
        }

        .shape-1 {
            width: 400px;
            height: 400px;
            background: rgba(255, 107, 139, 0.4);
            top: -100px;
            left: -100px;
        }

        .shape-2 {
            width: 500px;
            height: 500px;
            background: rgba(79, 172, 254, 0.3);
            bottom: -150px;
            right: -100px;
            animation-delay: -5s;
        }

        .shape-3 {
            width: 300px;
            height: 300px;
            background: rgba(255, 216, 168, 0.4);
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-duration: 15s;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(30px, 50px) scale(1.1); }
        }

        .login-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        .glass-card {
            background: var(--bg-glass);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-glass);
            border-radius: 24px;
            padding: 48px 40px;
            box-shadow: var(--shadow-glass);
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .glass-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px 0 rgba(31, 38, 135, 0.2);
        }

        .logo {
            margin-bottom: 30px;
        }

        .logo-icon {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 20px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 32px;
            margin-bottom: 16px;
            box-shadow: 0 10px 20px rgba(255, 107, 139, 0.3);
            transform: rotate(-10deg);
            transition: transform 0.3s ease;
        }

        .glass-card:hover .logo-icon {
            transform: rotate(0deg) scale(1.05);
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            color: var(--text-main);
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        p.subtitle {
            color: var(--text-light);
            font-size: 14px;
            margin-bottom: 32px;
        }

        .input-group {
            position: relative;
            margin-bottom: 24px;
            text-align: left;
        }

        .input-group i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-light);
            transition: color 0.3s ease;
        }

        .form-input {
            width: 100%;
            padding: 16px 16px 16px 48px;
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 12px;
            background: var(--bg-input);
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            color: var(--text-main);
            outline: none;
            transition: all 0.3s ease;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
        }

        .form-input::placeholder {
            color: #a0aec0;
        }

        .form-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(255, 107, 139, 0.1);
            background: #ffffff;
        }

        .form-input:focus + i {
            color: var(--primary);
        }

        .options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            font-size: 14px;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            cursor: pointer;
            color: var(--text-light);
        }

        .checkbox-label input {
            margin-right: 8px;
            accent-color: var(--primary);
            width: 16px;
            height: 16px;
        }

        .forgot-password {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .forgot-password:hover {
            color: var(--primary-hover);
            text-decoration: underline;
        }

        .btn-login {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-hover) 100%);
            color: white;
            font-family: 'Outfit', sans-serif;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 16px rgba(255, 107, 139, 0.25);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 20px rgba(255, 107, 139, 0.3);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .back-to-home {
            display: inline-block;
            margin-top: 24px;
            color: var(--text-light);
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s ease;
        }

        .back-to-home:hover {
            color: var(--text-main);
        }
        
        .back-to-home i {
            margin-right: 6px;
        }

        /* Error state styling */
        .error-message {
            display: none;
            color: #e53e3e;
            font-size: 13px;
            margin-top: -16px;
            margin-bottom: 16px;
            text-align: left;
            padding-left: 4px;
        }

        .input-group.error .form-input {
            border-color: #e53e3e;
            background: #fff5f5;
        }

        .input-group.error i {
            color: #e53e3e;
        }

    </style>
</head>
<body>

    <!-- Animated background shapes -->
    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>
    <div class="bg-shape shape-3"></div>

    <div class="login-container">
        <div class="glass-card">
            <div class="logo">
                <div class="logo-icon">
                    <i class="fa-solid fa-baby-carriage"></i>
                </div>
                <h1>Quản Trị Hệ Thống</h1>
                <p class="subtitle">Mẹ Bỉm Thông Thái Dashboard</p>
            </div>

            <form id="adminLoginForm">
                <div class="input-group">
                    <input type="email" id="email" class="form-input" placeholder="Email quản trị viên" required autocomplete="email">
                    <i class="fa-regular fa-envelope"></i>
                </div>
                
                <div class="input-group" id="passwordGroup">
                    <input type="password" id="password" class="form-input" placeholder="Mật khẩu" required autocomplete="current-password">
                    <i class="fa-solid fa-lock"></i>
                </div>
                
                <div id="errorMessage" class="error-message">Email hoặc mật khẩu không chính xác.</div>

                <div class="options">
                    <label class="checkbox-label">
                        <input type="checkbox" id="remember"> Ghi nhớ đăng nhập
                    </label>
                    <a href="#" class="forgot-password">Quên mật khẩu?</a>
                </div>

                <button type="submit" class="btn-login" id="loginBtn">
                    <span>Đăng nhập</span>
                    <i class="fa-solid fa-arrow-right"></i>
                </button>
            </form>

            <a href="index.html" class="back-to-home">
                <i class="fa-solid fa-arrow-left"></i> Quay lại trang chủ
            </a>
        </div>
    </div>

    <script>
        document.getElementById('adminLoginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('loginBtn');
            const errorMsg = document.getElementById('errorMessage');
            const passwordGroup = document.getElementById('passwordGroup');

            // Button loading state
            const originalContent = loginBtn.innerHTML;
            loginBtn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> <span>Đang xử lý...</span>';
            loginBtn.style.opacity = '0.8';
            loginBtn.disabled = true;
            
            errorMsg.style.display = 'none';
            passwordGroup.classList.remove('error');

            try {
                const response = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    // Success
                    localStorage.setItem('adminToken', data.token);
                    if (data.admin) {
                        localStorage.setItem('adminInfo', JSON.stringify(data.admin));
                    }
                    
                    loginBtn.innerHTML = '<i class="fa-solid fa-check"></i> <span>Thành công!</span>';
                    loginBtn.style.background = 'linear-gradient(135deg, #48bb78 0%, #38a169 100%)';
                    
                    // Redirect to admin dashboard
                    setTimeout(() => {
                        window.location.href = 'admin.html';
                    }, 500);
                } else {
                    throw new Error(data.error || 'Đăng nhập thất bại');
                }
            } catch (error) {
                // Error
                loginBtn.innerHTML = originalContent;
                loginBtn.style.opacity = '1';
                loginBtn.disabled = false;
                
                errorMsg.textContent = error.message;
                errorMsg.style.display = 'block';
                passwordGroup.classList.add('error');
                
                // Shake animation for error
                const card = document.querySelector('.glass-card');
                card.style.animation = 'shake 0.5s cubic-bezier(.36,.07,.19,.97) both';
                setTimeout(() => {
                    card.style.animation = 'none';
                }, 500);
            }
        });

        // Add shake animation style dynamically
        const style = document.createElement('style');
        style.innerHTML = `
            @keyframes shake {
                10%, 90% { transform: translate3d(-1px, 0, 0); }
                20%, 80% { transform: translate3d(2px, 0, 0); }
                30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
                40%, 60% { transform: translate3d(4px, 0, 0); }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
