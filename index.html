      { age: '24 tháng tuổi', ageGroup: '18-24 tháng', name: 'Vắc xin phòng Thương hàn (Typhim Vi)', disease: 'Phòng bệnh sốt Thương hàn biến chứng ruột', doses: '1 mũi duy nhất (Tiêm nhắc mỗi 3 năm)', type: 'Dịch vụ (Có phí)', note: 'Dành cho trẻ từ 2 tuổi trở lên.' },
      { age: '24 tháng tuổi', ageGroup: '18-24 tháng', name: 'Vắc xin uống ngừa bệnh Tả (mORCVAX)', disease: 'Phòng dịch bệnh Tả lây lan qua nguồn nước', doses: '2 liều uống (Cách nhau 2 tuần)', type: 'TCMR/Dịch vụ', note: 'Thường triển khai ở các vùng có nguy cơ dịch tễ cao.' }
    ];

    // --- MAIN REACT APPLICATION COMPONENT ---
    function App() {
      // 1. Core States
      const [currentTab, setCurrentTab] = useState('home'); // home | articles | article-detail | community | tools | ai | admin
      const [dbState, setDbState] = useState(null);
      const [isSyncing, setIsSyncing] = useState(true);
      const [selectedMilestone, setSelectedMilestone] = useState('m_3m');
      const [selectedCategory, setSelectedCategory] = useState('Tất cả');
      const [activeArticle, setActiveArticle] = useState(null);
      const [searchQuery, setSearchQuery] = useState('');
      const [showSearchModal, setShowSearchModal] = useState(false);
      const [searchResults, setSearchResults] = useState({ articles: [], posts: [], keywords: [] });
      const [mobileMenuOpen, setMobileMenuOpen] = useState(false);
      
      // Admin dashboard sub-tab
      const [adminTab, setAdminTab] = useState('articles-list'); // articles-list | articles-form | community
      const [editingArticleId, setEditingArticleId] = useState(null);
      const [adminSearchQuery, setAdminSearchQuery] = useState('');
      const [newArticleForm, setNewArticleForm] = useState({
        title: '', category: 'Trẻ sơ sinh', subCategory: '', tags: '', summary: '', content: '', image: '',
        metaTitle: '', metaDescription: '', faqQ1: '', faqA1: '', faqQ2: '', faqA2: ''
      });
      
      // Community States
      const [activePost, setActivePost] = useState(null);
      const [newPostForm, setNewPostForm] = useState({ title: '', content: '', isAnonymous: false, tags: ['trẻ sơ sinh'] });
      const [showNewPostModal, setShowNewPostModal] = useState(false);
      const [commentContent, setCommentContent] = useState('');

      // Baby Tracker States
      const [activeBaby, setActiveBaby] = useState(null);
      const [showAddBabyModal, setShowAddBabyModal] = useState(false);
      const [newBabyForm, setNewBabyForm] = useState({ name: '', birthdate: '', gender: 'female' });
      const [showEditBabyModal, setShowEditBabyModal] = useState(false);
      const [editBabyForm, setEditBabyForm] = useState({ name: '', birthdate: '', gender: 'female' });
      
      // State cho tính năng Lịch Tiêm Chủng (Vaccination Schedule)
      const [vaccineActiveTab, setVaccineActiveTab] = useState('tracker'); // tracker | master
      const [vaccineFilterAge, setVaccineFilterAge] = useState('Tất cả');
      const [vaccineSearchQuery, setVaccineSearchQuery] = useState('');
      
      // Logs states for tools
      const [activeToolSubTab, setActiveToolSubTab] = useState('summary'); // summary | feeding | sleep | diaper | growth | vaccine
      const [feedingForm, setFeedingForm] = useState({ type: 'breast', amount: 100, duration: 15, note: '', time: '' });
      const [sleepForm, setSleepForm] = useState({ startTime: '13:00', endTime: '14:30', quality: 'good', note: '' });
      const [diaperForm, setDiaperForm] = useState({ type: 'wet', time: '12:00', note: '' });
      const [growthForm, setGrowthForm] = useState({ date: new Date().toISOString().split('T')[0], ageMonths: 4, weight: 6.5, height: 61.5, headCircumference: 39.5 });

      // AI Assistant Chat States
      const [aiMessages, setAiMessages] = useState([
        { sender: 'ai', text: 'Chào Mẹ! Em là Trợ lý AI của Mẹ Bỉm Thông Thái. Em có thể tư vấn khoa học về giấc ngủ, dinh dưỡng, tiêm phòng hoặc các bệnh thường gặp của bé. Mẹ cần em hỗ trợ gì hôm nay?', time: 'Vừa xong' }
      ]);
      const [chatInput, setChatInput] = useState('');
      const [aiTyping, setAiTyping] = useState(false);
      const chatEndRef = useRef(null);

      // --- INITIALIZE & SYNC WITH DB ENGINE ---
      useEffect(() => {
        // Đợi Database và AI script tải xong
        const interval = setInterval(() => {
          if (window.parentingDb && window.parentingAi) {
            clearInterval(interval);
            
            // Gọi init() bất đồng bộ (Neon Postgres Cloud Sync)
            window.parentingDb.init().then(async () => {
              // Thực hiện tải dữ liệu thực tế từ đám mây
              await window.parentingDb.syncFromCloud();

              const user = window.parentingDb.getCurrentUser();
              const babies = window.parentingDb.getBabyProfiles();
              const activeB = user ? (babies.find(b => b.id === user.babyId) || babies[0] || null) : null;
              
              setActiveBaby(activeB);
              setDbState({ ...window.parentingDb });
              setIsSyncing(false);
            });
          }
        }, 100);
        return () => clearInterval(interval);
      }, []);

      // Đăng ký cuộn xuống cho Chat AI
      useEffect(() => {
        if (chatEndRef.current) {
          chatEndRef.current.scrollIntoView({ behavior: 'smooth' });
        }
      }, [aiMessages, aiTyping]);

      // --- CHỨC NĂNG DYNAMIC SEO & SCHEMA INJECTION ---
      useEffect(() => {
        if (!activeArticle && currentTab !== 'article-detail') {
          // Reset default SEO
          document.title = "Mẹ Bỉm Thông Thái | Cẩm Nang Nuôi Dạy Con & Cộng Đồng Mẹ Bỉm Việt Nam";
          const desc = document.querySelector('meta[name="description"]');
          if (desc) desc.setAttribute("content", "Nền tảng chia sẻ kiến thức hữu ích về chăm sóc trẻ sơ sinh, dinh dưỡng, giấc ngủ, bệnh thường gặp và cộng đồng mẹ bỉm sữa.");
        }
      }, [currentTab, activeArticle]);

      // Vẽ biểu đồ tăng trưởng (Growth Tracker Chart) bằng Chart.js
      const chartRef = useRef(null);
      const [growthChartInstance, setGrowthChartInstance] = useState(null);

      useEffect(() => {
        if (currentTab === 'tools' && activeToolSubTab === 'growth' && activeBaby && chartRef.current) {
          // Xóa chart cũ nếu có
          if (growthChartInstance) {
            growthChartInstance.destroy();
          }

          const logs = window.parentingDb.getGrowthLogs(activeBaby.id);
          const labels = logs.map(l => `Tháng ${l.ageMonths}`);
          const weights = logs.map(l => l.weight);
          const heights = logs.map(l => l.height);

          const newChart = new Chart(chartRef.current, {
            type: 'line',
            data: {
              labels: labels,
              datasets: [
                {
                  label: 'Cân nặng của Bé (kg)',
                  data: weights,
                  borderColor: '#E04D65',
                  backgroundColor: 'rgba(224, 77, 101, 0.1)',
                  borderWidth: 3,
                  tension: 0.3,
                  yAxisID: 'y-weight',
                },
                {
                  label: 'Chiều cao của Bé (cm)',
                  data: heights,
                  borderColor: '#2D8E6B',
                  backgroundColor: 'rgba(45, 142, 107, 0.1)',
                  borderWidth: 3,
                  tension: 0.3,
                  yAxisID: 'y-height',
                  borderDash: [5, 5]
                }
              ]
            },
            options: {
              responsive: true,
              plugins: {
                legend: {
                  position: 'top',
                  labels: {
                    font: { family: 'Nunito', size: 13 }
                  }
                }
              },
              scales: {
                'y-weight': {
                  type: 'linear',
                  position: 'left',
                  title: { display: true, text: 'Cân nặng (kg)', font: { family: 'Nunito', weight: 'bold' } },
                  grid: { drawOnChartArea: true }
                },
                'y-height': {
                  type: 'linear',
                  position: 'right',
                  title: { display: true, text: 'Chiều cao (cm)', font: { family: 'Nunito', weight: 'bold' } },
                  grid: { drawOnChartArea: false }
                }
              }
            }
          });

          setGrowthChartInstance(newChart);
        }
      }, [currentTab, activeToolSubTab, activeBaby]);

      if (!dbState) {
        return (
          <div class="flex flex-col items-center justify-center min-h-screen">
            <div class="relative w-24 h-24 flex items-center justify-center animate-spin">
              <div class="w-12 h-12 rounded-full border-4 border-pink-500 border-t-transparent"></div>
            </div>
            <p class="mt-6 text-neutral-600 font-semibold text-lg font-sans">Đang chuẩn bị kho dữ liệu...</p>
          </div>
        );
      }

      // --- TRUY XUẤT THÔNG TIN DỰ PHÒNG TỪ DATABASE ---
      const articles = dbState.getArticles();
      const posts = dbState.getPosts();
      const currentUser = dbState.getCurrentUser();
      const babyProfiles = dbState.getBabyProfiles();
      const milestones = dbState.getMilestones();
      
      // Lọc danh mục bài viết
      const categories = ['Tất cả', 'Trẻ sơ sinh', 'Dinh dưỡng cho bé', 'Giấc ngủ', 'Sức khỏe trẻ em', 'Phát triển trí tuệ', 'Chăm sóc mẹ sau sinh'];
      const filteredArticles = selectedCategory === 'Tất cả' 
        ? articles 
        : articles.filter(art => art.category === selectedCategory);

      // --- DYNAMIC SEO META UPDATE KHI ĐỌC BÀI VIẾT ---
      const viewArticleDetail = (art) => {
        setActiveArticle(art);
        setCurrentTab('article-detail');
        
        // Cập nhật SEO Tags
        document.title = `${art.title} | Mẹ Bỉm Thông Thái`;
        const desc = document.querySelector('meta[name="description"]');
        if (desc) desc.setAttribute("content", art.summary);
        
        // Inject Article Schema & FAQ Schema
        const schemaEl = document.getElementById('seo-schema');
        if (schemaEl) {
          const articleSchema = {
            "@context": "https://schema.org",
            "@type": "NewsArticle",
            "headline": art.title,
            "description": art.summary,
            "image": [art.image || "https://images.unsplash.com/photo-1519689680058-324335c77ebe?w=600"],
            "datePublished": art.createdAt,
            "author": {
              "@type": "Person",
              "name": art.author
            }
          };
          schemaEl.innerText = JSON.stringify(articleSchema, null, 2);
        }
      };

      // --- XỬ LÝ HỎI AI BOT ---
      const handleAskAi = (question = null) => {
        const query = question || chatInput;
        if (!query.trim()) return;

        // Thêm câu hỏi của user vào chat
        const newMsgUser = { sender: 'user', text: query, time: new Date().toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' }) };
        setAiMessages(prev => [...prev, newMsgUser]);
        setChatInput('');
        setAiTyping(true);

        // Giả lập xử lý AI chậm lại một chút tạo cảm giác tự nhiên
        setTimeout(() => {
          const aiResponse = window.parentingAi.ask(query);
          const newMsgAi = {
            sender: 'ai',
            text: aiResponse.response,
            title: aiResponse.title,
            time: new Date().toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' })
          };
          setAiMessages(prev => [...prev, newMsgAi]);
          setAiTyping(false);
        }, 1200);
      };

      // --- HÀM TÌM KIẾM THÔNG MINH ---
      const handleSearch = (e) => {
        const query = e.target.value;
        setSearchQuery(query);
        if (query.trim() === '') {
          setSearchResults({ articles: [], posts: [], keywords: [] });
          return;
        }
        
        const results = window.parentingAi.search(query, articles, posts);
        setSearchResults(results);
      };

      const handleQuickSearchKeyword = (keyword) => {
        setSearchQuery(keyword);
        const results = window.parentingAi.search(keyword, articles, posts);
        setSearchResults(results);
      };

      // --- COMMUNTIY ACTIONS ---
      const handleCreatePost = (e) => {
        e.preventDefault();
        if (!newPostForm.title.trim() || !newPostForm.content.trim()) return;

        dbState.addPost(newPostForm);
        setNewPostForm({ title: '', content: '', isAnonymous: false, tags: ['trẻ sơ sinh'] });
        setShowNewPostModal(false);
        // Refresh local UI
        setDbState({ ...dbState });
      };

      const handleVote = (postId, voteType) => {
        dbState.votePost(postId, voteType);
        setDbState({ ...dbState });
        if (activePost && activePost.id === postId) {
          setActivePost(dbState.getPosts().find(p => p.id === postId));
        }
      };

      const handleAddComment = (e) => {
        e.preventDefault();
        if (!commentContent.trim()) return;

        dbState.addComment(activePost.id, commentContent);
        setCommentContent('');
        // Sync active post details
        setActivePost(dbState.getPosts().find(p => p.id === activePost.id));
        setDbState({ ...dbState });
      };

      // --- LOGGING TOOLS ACTIONS ---
      const handleAddBaby = (e) => {
        e.preventDefault();
        if (!newBabyForm.name.trim() || !newBabyForm.birthdate) return;

        const newB = dbState.addBabyProfile(newBabyForm);
        setActiveBaby(newB);
        setShowAddBabyModal(false);
        setNewBabyForm({ name: '', birthdate: '', gender: 'female' });
        setDbState({ ...dbState });
      };

      const handleEditBaby = (e) => {
        e.preventDefault();
        if (!editBabyForm.name.trim() || !editBabyForm.birthdate) return;

        const updatedBaby = dbState.updateBabyProfile(activeBaby.id, editBabyForm);
        dbState.recalculateVaccinations(activeBaby.id, editBabyForm.birthdate);
        setActiveBaby(updatedBaby);
        setShowEditBabyModal(false);
        setDbState({ ...dbState });
      };

      const handleLogFeeding = (e) => {
        e.preventDefault();
        if (!activeBaby) return;

        const recordTime = feedingForm.time || new Date().toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' });

        dbState.addFeedingLog({
          babyId: activeBaby.id,
          type: feedingForm.type,
          time: recordTime,
          amount: feedingForm.type === 'direct' ? 0 : Number(feedingForm.amount),
          duration: feedingForm.type === 'direct' ? Number(feedingForm.duration) : 0,
          note: feedingForm.note
        });

        setFeedingForm({ type: 'breast', amount: 100, duration: 15, note: '', time: '' });
        setDbState({ ...dbState });
      };

      const handleLogSleep = (e) => {
        e.preventDefault();
        if (!activeBaby) return;

        const [sh, sm] = sleepForm.startTime.split(':').map(Number);
        const [eh, em] = sleepForm.endTime.split(':').map(Number);
        let diffMin = (eh * 60 + em) - (sh * 60 + sm);
        if (diffMin < 0) diffMin += 24 * 60; // Ngủ qua đêm

        dbState.addSleepLog({
          babyId: activeBaby.id,
          startTime: sleepForm.startTime,
          endTime: sleepForm.endTime,
          duration: diffMin,
          quality: sleepForm.quality,
          note: sleepForm.note
        });

        setSleepForm({ startTime: '13:00', endTime: '14:30', quality: 'good', note: '' });
        setDbState({ ...dbState });
      };

      const handleLogDiaper = (e) => {
        e.preventDefault();
        if (!activeBaby) return;

        dbState.addDiaperLog({
          babyId: activeBaby.id,
          type: diaperForm.type,
          time: diaperForm.time,
          note: diaperForm.note
        });

        setDiaperForm({ type: 'wet', time: '12:00', note: '' });
        setDbState({ ...dbState });
      };

      const handleLogGrowth = (e) => {
        e.preventDefault();
        if (!activeBaby) return;

        dbState.addGrowthLog({
          babyId: activeBaby.id,
          date: growthForm.date,
          ageMonths: Number(growthForm.ageMonths),
          weight: Number(growthForm.weight),
          height: Number(growthForm.height),
          headCircumference: Number(growthForm.headCircumference)
        });

        setGrowthForm({ date: new Date().toISOString().split('T')[0], ageMonths: growthForm.ageMonths + 1, weight: growthForm.weight + 0.5, height: growthForm.height + 2, headCircumference: growthForm.headCircumference + 0.5 });
        setDbState({ ...dbState });
      };

      // --- ADMIN ACTION ---
      const handleSubmitArticle = (e) => {
        e.preventDefault();
        if (!newArticleForm.title.trim() || !newArticleForm.content.trim()) return;

        const faqs = [];
        if (newArticleForm.faqQ1 && newArticleForm.faqA1) {
          faqs.push({ q: newArticleForm.faqQ1, a: newArticleForm.faqA1 });
        }
        if (newArticleForm.faqQ2 && newArticleForm.faqA2) {
          faqs.push({ q: newArticleForm.faqQ2, a: newArticleForm.faqA2 });
        }

        const articleData = {
          title: newArticleForm.title,
          category: newArticleForm.category,
          subCategory: newArticleForm.subCategory,
          tags: newArticleForm.tags.split(',').map(t => t.trim()).filter(Boolean),
          summary: newArticleForm.summary,
          content: newArticleForm.content,
          image: newArticleForm.image || "https://images.unsplash.com/photo-1519689680058-324335c77ebe?w=600",
          faqs: faqs
        };

        if (editingArticleId) {
          // Cập nhật bài viết
          dbState.updateArticle(editingArticleId, articleData);
          alert('Cập nhật bài viết thành công!');
          setEditingArticleId(null);
        } else {
          // Tạo mới bài viết
          dbState.addArticle(articleData);
          alert('Đăng bài viết chuẩn SEO thành công!');
        }

        setNewArticleForm({
          title: '', category: 'Trẻ sơ sinh', subCategory: '', tags: '', summary: '', content: '', image: '',
          metaTitle: '', metaDescription: '', faqQ1: '', faqA1: '', faqQ2: '', faqA2: ''
        });
        setDbState({ ...dbState });
        setAdminTab('articles-list'); // Quay lại trang danh sách bài viết
      };

      // --- RENDER FUNCTIONS FOR VIEWS ---
      const renderHome = () => {
        const featured = articles.filter(a => a.isFeatured);
        const trending = articles.filter(a => a.isTrending);
        const currentMilestone = milestones.find(m => m.id === selectedMilestone) || milestones[0];

        return (
          <div className="fade-in space-y-12 pb-16">
            {/* HERO SECTION */}
            <section className="relative overflow-hidden rounded-3xl gradient-header shadow-md p-8 md:p-12 flex flex-col md:flex-row items-center justify-between gap-8">
              <div className="max-w-xl space-y-6 text-left">
                <span className="bg-brand-pink-pastel text-brand-pink-dark px-4 py-1.5 rounded-full text-sm font-semibold tracking-wide shadow-sm">
                  Nuôi Con Khoa Học v3.0
                </span>
                <h1 className="text-3xl md:text-5xl leading-tight font-extrabold text-neutral-800">
                  Đồng hành cùng mẹ trên hành trình <span className="text-brand-pink-dark">nuôi con khỏe mạnh</span> và hạnh phúc
                </h1>
                <p className="text-neutral-600 text-lg leading-relaxed">
                  Kiến thức hữu ích về trẻ sơ sinh, dinh dưỡng, giấc ngủ, sức khỏe và cộng đồng mẹ bỉm chia sẻ kinh nghiệm thực tế.
                </p>
                <div className="flex flex-wrap gap-4 pt-2">
                  <button onClick={() => setCurrentTab('articles')} className="btn-primary px-8 py-3.5 font-semibold text-white flex items-center">
                    Khám phá kiến thức <Icons.ChevronRight />
                  </button>
                  <button onClick={() => setCurrentTab('community')} className="bg-white border border-brand-pink-pastel text-brand-pink-dark hover:bg-brand-pink-light px-8 py-3.5 rounded-full font-semibold transition-all duration-200 shadow-sm flex items-center gap-1.5">
                    <Icons.Users /> Tham gia cộng đồng
                  </button>
                </div>
              </div>
              <div className="relative w-full md:w-1/2 max-w-md">
                <div className="absolute inset-0 bg-brand-pink-pastel rounded-3xl transform rotate-3 scale-95 opacity-20"></div>
                <img 
                  src="/viet_mom_baby.png" 
                  alt="Mẹ và bé Việt" 
                  className="relative rounded-3xl shadow-xl w-full object-cover aspect-[4/3] border-4 border-white"
                />
              </div>
            </section>

            {/* QUICK CATEGORIES */}
            <section className="space-y-6">
              <div className="text-center md:text-left">
                <h2 className="text-2xl font-extrabold">Chuyên mục nổi bật</h2>
                <p className="text-neutral-500 mt-1">Truy cập nhanh kho kiến thức theo từng chủ đề cần thiết</p>
              </div>
              <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                {[
                  { name: 'Trẻ sơ sinh', icon: '👶', desc: '0 - 12 tháng tuổi', color: 'bg-brand-pink-light text-brand-pink-dark' },
                  { name: 'Dinh dưỡng cho bé', icon: '🥦', desc: 'Ăn dặm, BLW, sữa', color: 'bg-brand-mint-light text-brand-mint-dark' },
                  { name: 'Giấc ngủ', icon: '🌙', desc: 'Sleep training, routine', color: 'bg-indigo-50 text-indigo-600' },
                  { name: 'Sức khỏe trẻ em', icon: '🩺', desc: 'Sốt, ho, bệnh vặt', color: 'bg-red-50 text-red-600' },
                  { name: 'Phát triển trí tuệ', icon: '🧩', desc: 'Montessori, vận động', color: 'bg-yellow-50 text-yellow-600' },
                  { name: 'Chăm sóc mẹ sau sinh', icon: '🌸', desc: 'Phục hồi, tâm lý', color: 'bg-purple-50 text-purple-600' },
                  { name: 'Ăn dặm kiểu Nhật', icon: '🍱', desc: 'Thực đơn ăn dặm', color: 'bg-orange-50 text-orange-600' },
                  { name: 'Góc mẹ bỉm', icon: '💬', desc: 'Tâm sự, hỏi đáp', color: 'bg-cyan-50 text-cyan-600' }
                ].map((cat, idx) => (
                  <div 
                    key={idx} 
                    onClick={() => { setSelectedCategory(cat.name === 'Giấc ngủ' ? 'Giấc ngủ' : cat.name); setCurrentTab('articles'); }}

                    placeholder="Soạn thảo bài viết: hỗ trợ markdown như ### Tiêu đề con, * Gạch đầu dòng, > Trích dẫn..."
                    className="w-full bg-neutral-50 border border-neutral-200 outline-none px-4 py-2.5 rounded-xl text-sm font-mono focus:border-brand-pink-pastel focus:bg-white transition-all"
                  ></textarea>
                </div>

                {/* FAQ Schema fields */}
                <div className="bg-neutral-50 p-4 rounded-xl border border-neutral-200 space-y-4">
                  <p className="text-xs font-bold text-neutral-800">🛠️ Cài đặt FAQ Schema (Tìm kiếm Google sẽ hiển thị trực tiếp accordion câu hỏi)</p>
                  
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-4 text-xs">
                    <div className="space-y-2">
                      <input 
                        type="text" 
                        value={newArticleForm.faqQ1} 
                        onChange={(e) => setNewArticleForm({...newArticleForm, faqQ1: e.target.value})} 
                        placeholder="Câu hỏi thường gặp 1..." 
                        className="w-full bg-white border border-neutral-200 outline-none px-3 py-2 rounded-lg focus:border-brand-pink-pastel transition-all" 
                      />
                      <input 
                        type="text" 
                        value={newArticleForm.faqA1} 
                        onChange={(e) => setNewArticleForm({...newArticleForm, faqA1: e.target.value})} 
                        placeholder="Câu trả lời thường gặp 1..." 
                        className="w-full bg-white border border-neutral-200 outline-none px-3 py-2 rounded-lg focus:border-brand-pink-pastel transition-all" 
                      />
                    </div>
                    <div className="space-y-2">
                      <input 
                        type="text" 
                        value={newArticleForm.faqQ2} 
                        onChange={(e) => setNewArticleForm({...newArticleForm, faqQ2: e.target.value})} 
                        placeholder="Câu hỏi thường gặp 2..." 
                        className="w-full bg-white border border-neutral-200 outline-none px-3 py-2 rounded-lg" 
                      />
                      <input 
                        type="text" 
                        value={newArticleForm.faqA2} 
                        onChange={(e) => setNewArticleForm({...newArticleForm, faqA2: e.target.value})} 
                        placeholder="Câu trả lời thường gặp 2..." 
                        className="w-full bg-white border border-neutral-200 outline-none px-3 py-2 rounded-lg" 
                      />
                    </div>

                </div>

                <button type="submit" className="btn-primary w-full py-3 font-semibold text-sm">📢 Xuất bản bài viết chuẩn SEO Google</button>
              </form>
            )}

            {adminTab === 'community' && (
              <div className="bg-white p-6 rounded-2xl border border-neutral-100 space-y-4">
                <h3 className="font-extrabold text-neutral-800 text-lg">🛡️ Kiểm duyệt diễn đàn & Bình luận</h3>
                <div className="space-y-3">
                  {posts.map((post) => (
                    <div key={post.id} className="p-4 bg-neutral-50 rounded-xl border border-neutral-200 flex justify-between items-center text-xs md:text-sm">
                      <div>
                        <p className="font-bold text-neutral-800">{post.title}</p>
                        <p className="text-[10px] text-neutral-400 mt-0.5">
                          Đăng bởi: {post.author.nickname} • Ngày đăng: {new Date(post.createdAt).toLocaleDateString('vi-VN')}
                        </p>
                      </div>
                      
                      <button 
                        onClick={() => { dbState.deletePost(post.id); setDbState({ ...dbState }); alert('Xóa bài thành công!'); }}
                        className="bg-red-50 text-red-600 hover:bg-red-100 px-3.5 py-1.5 rounded-lg font-bold"
                      >
                        🗑️ Xóa bài
                      </button>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </div>
        );
      };

      // --- AUTHENTICATION COMPONENT ---
      const AuthForm = ({ type, setCurrentTab, setDbState, setActiveBaby }) => {
        const isLogin = type === 'login';
        const [emailOrPhone, setEmailOrPhone] = useState('');
        const [password, setPassword] = useState('');
        const [name, setName] = useState('');
        const [errorMsg, setErrorMsg] = useState('');
        const [loading, setLoading] = useState(false);

        const handleAuthSubmit = async (e) => {
          e.preventDefault();
          setErrorMsg('');
          setLoading(true);

          try {
            // Tự động nhận diện đăng nhập quản trị viên nếu nhập email admin
            const isAdminLogin = isLogin && emailOrPhone.trim().toLowerCase() === 'admin@mebim.vn';
            const url = isAdminLogin ? '/api/admin/login' : (isLogin ? '/api/users/login' : '/api/users/register');
            
            const body = isAdminLogin 
              ? { email: emailOrPhone, password }
              : (isLogin ? { emailOrPhone, password } : { emailOrPhone, password, name });

            const response = await fetch(url, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(body)
            });

            const data = await response.json();

            if (!response.ok) {
              throw new Error(data.error || 'Có lỗi xảy ra, vui lòng thử lại!');
            }

            // Đăng nhập/Đăng ký thành công
            if (data.token) {
              localStorage.setItem('user_token', data.token);
            }
            
            if (isAdminLogin) {
              const adminUser = {
                id: data.admin.id,
                name: data.admin.name,
                nickname: data.admin.name,
                avatar: 'https://images.unsplash.com/photo-1622253692010-333f2da6031d?w=150&auto=format&fit=crop&q=80', // Avatar bác sĩ/admin chuyên gia
                badge: 'Quản trị viên 🛡️',
                points: 9999,
                role: 'admin'
              };
              window.parentingDb.setCurrentUser(adminUser);
              setActiveBaby({ id: 'baby_admin', name: 'Hệ thống Quản lý', birthdate: '2026-02-15', gender: 'female' });
              alert(`Chào mừng Admin, ${adminUser.name}! Đăng nhập thành công hệ thống quản trị.`);
            } else {
              // Cập nhật currentUser trong db engine
              window.parentingDb.setCurrentUser(data.user);
              
              // Đồng bộ bé
              const babies = isLogin ? (data.babies || []) : [data.baby];
              const database = window.parentingDb.getDb ? window.parentingDb.getDb() : null;
              if (database) {
                database.babyProfiles = babies;
                window.parentingDb.saveDb(database);
              }
              
              const activeB = babies[0] || null;
              setActiveBaby(activeB);
              alert(isLogin ? `Chào mừng quay trở lại, ${data.user.nickname || data.user.name}! Đăng nhập thành công.` : 'Đăng ký tài khoản thành công! Em bé mặc định đã được thiết lập.');
            }
            
            setDbState({ ...window.parentingDb });
            // Quay về trang chủ
            setCurrentTab('home');
          } catch (err) {
            setErrorMsg(err.message);
          } finally {
            setLoading(false);
          }
        };

        return (
          <div className="fade-in max-w-md mx-auto w-full py-12">
            <div className="bg-white/80 backdrop-blur-xl rounded-3xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-white/50 p-8 relative overflow-hidden">
              {/* Trang trí góc */}
              <div className="absolute -top-16 -right-16 w-32 h-32 bg-brand-pink-pastel/30 rounded-full blur-2xl"></div>
              <div className="absolute -bottom-16 -left-16 w-32 h-32 bg-brand-mint-pastel/30 rounded-full blur-2xl"></div>

              <div className="relative z-10 space-y-6">
                <div className="text-center space-y-2">
                  <div className="w-16 h-16 bg-brand-pink-light rounded-2xl mx-auto flex items-center justify-center text-3xl shadow-sm mb-4">
                    👶
                  </div>
                  <h2 className="text-2xl font-extrabold text-neutral-800">
                    {isLogin ? 'Mẹ trở lại rồi!' : 'Bắt đầu hành trình'}
                  </h2>
                  <p className="text-sm text-neutral-500">
                    {isLogin ? 'Đăng nhập để xem nhật ký của bé' : 'Tạo tài khoản để đồng hành cùng con'}
                  </p>
                </div>

                {errorMsg && (
                  <div className="p-3 bg-red-50 text-red-600 text-xs rounded-xl font-bold text-center border border-red-200 fade-in">
                    ⚠️ {errorMsg}
                  </div>
                )}

                <form onSubmit={handleAuthSubmit} className="space-y-4 text-left">
                  {!isLogin && (
                    <div className="space-y-1.5">
                      <label className="text-xs font-bold text-neutral-700 ml-1">Tên của mẹ</label>
                      <input 
                        type="text" 
                        placeholder="VD: Mẹ Bông" 
                        value={name}
                        onChange={(e) => setName(e.target.value)}
                        className="w-full px-4 py-3 bg-neutral-50/50 border border-neutral-200 rounded-xl text-sm focus:bg-white focus:border-brand-pink-pastel focus:ring-4 focus:ring-brand-pink-pastel/10 outline-none transition-all" 
                        required 
                      />
                    </div>
                  )}
                  <div className="space-y-1.5">
                    <label className="text-xs font-bold text-neutral-700 ml-1">Email / Số điện thoại</label>
                    <input 
                      type="text" 
                      placeholder="Nhập email hoặc số điện thoại..." 
                      value={emailOrPhone}
                      onChange={(e) => setEmailOrPhone(e.target.value)}
                      className="w-full px-4 py-3 bg-neutral-50/50 border border-neutral-200 rounded-xl text-sm focus:bg-white focus:border-brand-pink-pastel focus:ring-4 focus:ring-brand-pink-pastel/10 outline-none transition-all" 
                      required 
                    />
                  </div>
                  <div className="space-y-1.5">
                    <div className="flex items-center justify-between ml-1">
                      <label className="text-xs font-bold text-neutral-700">Mật khẩu</label>
                      {isLogin && <a href="#" className="text-xs text-brand-pink-dark font-semibold hover:underline">Quên mật khẩu?</a>}
                    </div>
                    <input 
                      type="password" 
                      placeholder="••••••••" 
                      value={password}
                      onChange={(e) => setPassword(e.target.value)}
                      className="w-full px-4 py-3 bg-neutral-50/50 border border-neutral-200 rounded-xl text-sm focus:bg-white focus:border-brand-pink-pastel focus:ring-4 focus:ring-brand-pink-pastel/10 outline-none transition-all" 
                      required 
                    />
                  </div>

                  <button 
                    type="submit" 
                    disabled={loading}
                    className={`w-full py-3.5 bg-brand-pink-dark hover:bg-brand-pink-dark/90 text-white font-bold rounded-xl shadow-lg shadow-brand-pink-dark/20 transform hover:-translate-y-0.5 transition-all mt-2 flex items-center justify-center gap-2 ${loading ? 'opacity-70 cursor-not-allowed' : ''}`}
                  >
                    {loading ? (
                      <span className="w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin"></span>
                    ) : null}
                    {isLogin ? 'Đăng nhập' : 'Đăng ký tài khoản'}
                  </button>
                </form>

                <div className="pt-4 text-center text-sm text-neutral-500">
                  {isLogin ? "Mẹ chưa có tài khoản? " : "Mẹ đã có tài khoản? "}
                  <button 
                    onClick={() => setCurrentTab(isLogin ? 'register' : 'login')}
                    className="text-brand-pink-dark font-bold hover:underline"
                  >
                    {isLogin ? 'Đăng ký ngay' : 'Đăng nhập'}
                  </button>
                </div>
              </div>
            </div>
          </div>
        );
      };

      // --- RENDER DƯỚI DẠNG FOOTER & INFO PAGES ---
      const renderInfoPage = (title, content) => (
        <div className="fade-in max-w-3xl mx-auto p-6 md:p-10 soft-card bg-white space-y-4 text-left pb-16">
          <h1 className="text-2xl md:text-3xl font-extrabold text-neutral-800 border-b border-neutral-100 pb-3">{title}</h1>
          <div className="text-neutral-600 text-sm md:text-base leading-relaxed space-y-4 whitespace-pre-line">
            {content}
          </div>
        </div>
      );

      return (
        <div className="min-h-screen flex flex-col justify-between">
          
          {/* Cloud Sync Loading Overlay */}
          {isSyncing && (
            <div className="fixed inset-0 z-[100] bg-white/90 backdrop-blur-sm flex flex-col items-center justify-center fade-in">
              <div className="relative w-24 h-24 flex items-center justify-center">
                <div className="absolute inset-0 rounded-full border-4 border-brand-pink-pastel animate-ping opacity-75"></div>
                <div className="relative w-16 h-16 bg-white rounded-full flex items-center justify-center shadow-md">
                  <svg className="w-8 h-8 text-brand-pink-dark animate-bounce" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
                  </svg>
                </div>
              </div>
              <p className="mt-6 text-neutral-700 font-bold text-lg animate-pulse font-sans">Đang tải dữ liệu đám mây Neon...</p>
              <p className="text-xs text-neutral-500 mt-2">Vui lòng chờ trong giây lát</p>
            </div>
          )}

          {/* HEADER & MAIN NAVIGATION */}
          <header className="sticky top-0 z-40 bg-white/95 backdrop-blur-md border-b border-neutral-100 shadow-sm">
            <div className="max-w-7xl mx-auto px-4 md:px-6 py-4 flex items-center justify-between gap-4">
              
              {/* Logo / Brand */}
              <div 
                onClick={() => setCurrentTab('home')} 
                className="flex items-center gap-2.5 cursor-pointer hover:scale-102 transform transition-all flex-shrink-0"
              >
                <span className="w-10 h-10 bg-brand-pink-dark rounded-2xl flex items-center justify-center text-white text-2xl shadow-md">👶</span>
                <span className="font-extrabold text-neutral-800 tracking-tight text-lg md:text-xl font-sans">
                  Mẹ Bỉm <span className="text-brand-pink-dark">Thông Thái</span>
                </span>
              </div>

              {/* Smart search bar */}
              <div className="relative hidden md:flex flex-grow max-w-md">
                <input 
                  type="text" 
                  value={searchQuery}
                  onChange={handleSearch}
                  onFocus={() => setShowSearchModal(true)}
                  placeholder="Tìm kiếm thông minh như Google: bé sốt 38 độ, bé lười bú..."
                  className="w-full bg-neutral-50 hover:bg-neutral-100 focus:bg-white border border-neutral-200 focus:border-brand-pink-pastel outline-none pl-10 pr-4 py-2.5 rounded-full text-xs md:text-sm shadow-inner transition-all"
                />
                <span className="absolute left-3.5 top-3"><Icons.Search /></span>
              </div>

              {/* Navigation Tabs - Desktop */}
              <nav className="hidden lg:flex items-center gap-1">
                {[
                  { tab: 'home', name: 'Trang chủ' },
                  { tab: 'articles', name: 'Kiến thức' },
                  { tab: 'community', name: 'Cộng đồng' },
                  { tab: 'tools', name: 'Công cụ cho mẹ' },
                  { tab: 'ai', name: 'Trợ lý AI' }
                ].map((item, idx) => (
                  <button
                    key={idx}
                    onClick={() => setCurrentTab(item.tab)}
                    className={`px-4 py-2.5 rounded-full text-sm font-semibold transition-all ${
                      currentTab === item.tab 
                        ? 'nav-link-active' 
                        : 'text-neutral-600 hover:bg-neutral-50 hover:text-neutral-900'
                    }`}
                  >
                    {item.name}
                  </button>
                ))}
                
                {currentUser?.role === 'admin' && (
                  <button 
                    onClick={() => setCurrentTab('admin')} 
                    className={`px-4 py-2.5 rounded-full text-sm font-bold border transition-all ${
                      currentTab === 'admin' ? 'bg-indigo-600 text-white' : 'border-indigo-200 text-indigo-600 hover:bg-indigo-50'
                    }`}
                  >
                    🛡️ Admin Panel
                  </button>
                )}
              </nav>

              {/* Collapsible Mobile Menu toggle */}
              <button 
                onClick={() => setMobileMenuOpen(!mobileMenuOpen)}
                className="lg:hidden p-2 bg-neutral-50 hover:bg-neutral-100 rounded-xl"
              >
                <svg className="w-6 h-6 text-neutral-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  {mobileMenuOpen ? (
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12" />
                  ) : (
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 6h16M4 12h16M4 18h16" />
                  )}
                </svg>
              </button>

              {/* User Avatar dropdown */}
              {currentUser ? (
                <div className="hidden md:flex items-center gap-3 pl-3 border-l border-neutral-150 flex-shrink-0 relative group cursor-pointer py-1">
                  <div className="relative">
                    <div className="absolute -inset-0.5 rounded-full bg-gradient-to-tr from-brand-pink-dark via-brand-pink-pastel to-amber-300 animate-pulse opacity-40 blur-[1px]"></div>
                    <img 
                      src={currentUser.avatar} 
                      alt="User avatar" 
                      className="w-10 h-10 rounded-full object-cover border-2 border-white shadow-md relative z-10 hover:scale-105 transition-all duration-300" 
                    />
                    <span className="absolute -bottom-1 -right-1 z-20 w-5 h-5 bg-white border border-brand-pink-pastel/30 rounded-full flex items-center justify-center text-[10px] shadow-sm animate-bounce duration-1000">
                      {currentUser.role === 'admin' ? '🛡️' : '🌸'}
                    </span>
                  </div>
                  <div className="text-left text-xs z-10">
                    <p className="font-extrabold text-neutral-800 flex items-center gap-1 group-hover:text-brand-pink-dark transition-all">
                      {currentUser.nickname}
                    </p>
                    <p className="text-[10px] text-neutral-400 font-semibold mt-0.5">{currentUser.badge} • 🏆 {currentUser.points} đ</p>
                  </div>

                  {/* Logout Menu Popup */}
                  <div className="absolute top-full right-0 mt-2 w-32 bg-white border border-neutral-100 rounded-xl shadow-lg opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all">
                    <button onClick={() => { window.parentingDb.setCurrentUser(null); window.location.reload(); }} className="w-full text-left px-4 py-2.5 text-sm text-red-600 font-semibold hover:bg-red-50 rounded-xl flex items-center gap-2">
                      🚪 Đăng xuất
                    </button>
                  </div>
                </div>
              ) : (
                <div className="hidden md:flex items-center gap-2 pl-3 border-l border-neutral-150 flex-shrink-0">
                  <button onClick={() => setCurrentTab('login')} className="px-4 py-2 text-sm font-semibold text-neutral-600 hover:text-brand-pink-dark transition-all">Đăng nhập</button>
                  <button onClick={() => setCurrentTab('register')} className="px-4 py-2 text-sm font-bold text-white bg-brand-pink-dark hover:bg-brand-pink-dark/90 rounded-full shadow-md transition-all">Đăng ký</button>
                </div>
              )}

            </div>
          </header>

          {/* MOBILE NAVIGATION DRAWER */}
          {mobileMenuOpen && (
            <div className="lg:hidden bg-white border-b border-neutral-100 px-4 py-3 flex flex-col gap-2 shadow-inner">
              {/* Search bar inside drawer */}
              <div className="relative w-full mb-2">
                <input 
                  type="text" 
                  value={searchQuery}
                  onChange={handleSearch}
                  onFocus={() => setShowSearchModal(true)}
                  placeholder="Tìm kiếm thông minh..."
                  className="w-full bg-neutral-50 border border-neutral-200 outline-none pl-10 pr-4 py-2.5 rounded-full text-xs shadow-inner"
                />
                <span className="absolute left-3.5 top-3.5"><Icons.Search /></span>
              </div>

              {[
                { tab: 'home', name: '🏠 Trang chủ' },
                { tab: 'articles', name: '📚 Kiến thức cẩm nang' },
                { tab: 'community', name: '💬 Diễn đàn Mẹ bỉm' },
                { tab: 'tools', name: '📊 Công cụ cho mẹ' },
                { tab: 'ai', name: '🤖 Trợ lý AI' }
              ].map((item, idx) => (
                <button
                  key={idx}
                  onClick={() => { setCurrentTab(item.tab); setMobileMenuOpen(false); }}
                  className={`text-left w-full px-4 py-2.5 rounded-xl text-sm font-semibold transition-all ${
                    currentTab === item.tab 
                      ? 'bg-brand-pink-light text-brand-pink-dark font-bold' 
                      : 'text-neutral-600 hover:bg-neutral-50'
                  }`}
                >
                  {item.name}
                </button>
              ))}

              {currentUser?.role === 'admin' && (
                <button
                  onClick={() => { setCurrentTab('admin'); setMobileMenuOpen(false); }}
                  className="text-left w-full px-4 py-2.5 rounded-xl text-sm font-bold bg-indigo-50 text-indigo-600"
                >
                  🛡️ Admin Panel
                </button>
              )}

              {/* User summary in drawer */}
              {currentUser ? (
                <div className="flex flex-col gap-3 p-4 bg-gradient-to-br from-brand-pink-light/35 to-amber-50/20 rounded-3xl border border-brand-pink-light/30 mt-3 shadow-inner">
                  <div className="flex items-center gap-3">
                    <div className="relative">
                      <div className="absolute -inset-0.5 rounded-full bg-gradient-to-tr from-brand-pink-dark to-amber-300 opacity-30 blur-[0.5px]"></div>
                      <img 
                        src={currentUser.avatar} 
                        alt="User avatar" 
                        className="w-12 h-12 rounded-full object-cover border-2 border-white shadow relative z-10" 
                      />
                      <span className="absolute -bottom-1 -right-1 z-20 w-5 h-5 bg-white border border-brand-pink-pastel/30 rounded-full flex items-center justify-center text-[10px] shadow-sm animate-bounce">
                        {currentUser.role === 'admin' ? '🛡️' : '🌸'}
                      </span>
                    </div>
                    <div className="text-left flex-grow">
                      <p className="font-extrabold text-neutral-800 text-sm">{currentUser.nickname}</p>
                      <p className="text-xs text-neutral-400 font-semibold mt-0.5">{currentUser.badge} • 🏆 {currentUser.points} điểm</p>
                    </div>
                  </div>
                  <button 
                    onClick={() => { window.parentingDb.setCurrentUser(null); window.location.reload(); }}
                    className="w-full text-center px-4 py-2 mt-1 text-sm text-red-600 font-semibold bg-red-50 hover:bg-red-100 rounded-lg border border-red-100 transition-all"
                  >
                    🚪 Đăng xuất tài khoản
                  </button>
                </div>
              ) : (
                <div className="flex flex-col gap-2 p-3 mt-2">
                  <button onClick={() => { setCurrentTab('login'); setMobileMenuOpen(false); }} className="w-full text-center px-4 py-2.5 text-sm font-semibold text-brand-pink-dark bg-brand-pink-light rounded-xl transition-all">Đăng nhập</button>
                  <button onClick={() => { setCurrentTab('register'); setMobileMenuOpen(false); }} className="w-full text-center px-4 py-2.5 text-sm font-bold text-white bg-brand-pink-dark rounded-xl shadow-md transition-all">Đăng ký</button>

            {currentTab === 'register' && <AuthForm type="register" setCurrentTab={setCurrentTab} setDbState={setDbState} setActiveBaby={setActiveBaby} />}
            {currentTab === 'home' && renderHome()}
            {currentTab === 'articles' && renderArticles()}
            {currentTab === 'article-detail' && renderArticleDetail()}
            {currentTab === 'community' && renderCommunity()}
            {currentTab === 'tools' && renderTools()}
            {currentTab === 'ai' && renderAi()}
            {currentTab === 'admin' && renderAdmin()}
            {currentTab === 'about' && renderInfoPage(

              `Chào mừng Mẹ đến với Mẹ Bỉm Thông Thái!

              **Sứ mệnh của chúng tôi:**
              Đồng hành cùng hàng triệu bà mẹ Việt Nam giảm bớt áp lực, lo lắng trên hành trình nuôi dạy con. Chúng tôi tin rằng nuôi dạy con không cần phải là một cuộc chiến đầy nước mắt, mà là một hành trình kỳ diệu hạnh phúc nếu có sự thấu hiểu, kiên trì và ứng dụng y khoa khoa học đúng đắn.

              **Tại Mẹ Bỉm Thông Thái, Mẹ có thể:**

              2. Áp dụng các phương pháp luyện tự ngủ (Sleep training) nhân văn, an toàn, thiết lập Wake window phù hợp sinh lý bé.

            {currentTab === 'contact' && renderInfoPage(
              "Liên hệ với chúng tôi",
              `Chúng tôi luôn mong muốn lắng nghe những chia sẻ, góp ý hoặc cơ hội hợp tác quảng cáo của quý đối tác.

              Tầng 6, Tòa nhà Mẹ và Bé Việt, Đường Hoàng Quốc Việt, Cầu Giấy, Hà Nội.

              **Đường dây nóng hỗ trợ 24/7:**
              Hotline: 1800 6868 (Miễn phí cuộc gọi nội mạng)
              Email hỗ trợ chuyên môn: bacsi@mebimthongthai.vn
              Email hợp tác truyền thông: media@mebimthongthai.vn

              **Gửi thông điệp hợp tác:**
              Nếu mẹ bỉm hoặc các đơn vị phân phối sữa, tã, đồ chơi giáo dục chất lượng cao có nhu cầu đồng hành, vui lòng gửi email trực tiếp để đội ngũ ban trị sự duyệt hồ sơ.`
            )}
            {currentTab === 'privacy' && renderInfoPage(
              "Chính sách bảo mật riêng tư",
              `Mẹ Bỉm Thông Thái cam kết bảo mật thông tin hồ sơ của mẹ và bé an toàn tuyệt đối.

              1. **Thông tin thu thập:** Chúng tôi chỉ lưu trữ cục bộ các số liệu sinh học của bé (Cân nặng, chiều cao, nhật ký bú sữa, giờ ngủ) để tạo lập biểu đồ tăng trưởng chính xác. Mẹ hoàn toàn kiểm soát việc xóa dữ liệu.
              2. **Chế độ ẩn danh (Anonymous mode):** Khi mẹ đăng câu hỏi trong diễn đàn ở chế độ ẩn danh, toàn bộ thông tin tài khoản bao gồm tên thật, email, nickname sẽ được che giấu tuyệt đối.
              3. **Quảng cáo & Bên thứ ba:** Chúng tôi cam kết tuyệt đối không bán hay phân phối số liệu sinh học của bé hoặc số điện thoại của mẹ cho các đơn vị tiếp thị bên ngoài.`
            )}
            {currentTab === 'terms' && renderInfoPage(
              "Điều khoản sử dụng dịch vụ",
              `Chào mừng bạn đến với Mẹ Bỉm Thông Thái. Bằng việc truy cập sử dụng website, bạn cam kết tuân thủ các quy tắc hoạt động của chúng tôi:

              1. **Tuyên bố miễn trừ trách nhiệm y tế (Medical Disclaimer):** Toàn bộ thông tin được cung cấp bởi bài viết hoặc Trợ lý AI chỉ mang tính chất tham khảo chung. Nó không thay thế bất kỳ chẩn đoán hoặc đơn thuốc của bác sĩ nhi khoa. Mẹ cần đưa bé đến bệnh viện nếu có dấu hiệu sốt cao, khó thở.
              2. **Quy tắc diễn đàn:** Không đăng nội dung thô tục, chửi bới xúc phạm thành viên khác. Không spam quảng cáo hoặc bán thuốc giả trong các bài thảo luận. Mọi bài viết vi phạm sẽ bị Admin xóa vĩnh viễn và khóa tài khoản.`
            )}

            <span className="text-xl">🤖</span>
            <span className="font-bold text-xs hidden md:inline">Hỏi Trợ lý AI</span>

            <div className="fixed inset-0 z-50 bg-neutral-950/40 backdrop-blur-xs flex items-start justify-center pt-24 px-4">

                    type="text" 
                    value={searchQuery}
                    onChange={handleSearch}
                    autoFocus
                    placeholder="Tìm kiếm: Bé sốt, Bé khóc đêm, Ăn dặm..."
                    className="w-full bg-neutral-50 outline-none pl-10 pr-12 py-3 rounded-2xl text-sm border border-neutral-200 focus:border-brand-pink-pastel focus:bg-white transition-all font-sans"
                  />

                  <button 
                    onClick={() => { setShowSearchModal(false); setSearchQuery(''); setSearchResults({ articles: [], posts: [], keywords: [] }); }}
                    className="absolute right-7 top-7 text-xs font-bold text-neutral-400 hover:text-neutral-700"
                  >
                    ✕ Đóng
                  </button>
                </div>

                {/* Results dropdown panel */}
                <div className="max-h-[60vh] overflow-y-auto p-4 space-y-4 text-left text-xs md:text-sm">
                  {searchQuery.trim() === '' ? (
                    <div className="space-y-3">
                      <p className="font-bold text-neutral-500">🔥 Từ khóa được tìm kiếm nhiều nhất</p>
                      <div className="flex flex-wrap gap-2">
                        {['Bé bị sốt', 'Bé ngủ ngày cày đêm', 'Táo bón sinh lý', 'Tập bú bình', 'Ăn dặm tự chỉ huy BLW', 'Trầm cảm sau sinh'].map((kw, idx) => (
                          <button 
                            key={idx}
                            onClick={() => handleQuickSearchKeyword(kw)}
                            className="bg-neutral-50 hover:bg-brand-pink-light/40 border border-neutral-200 hover:border-brand-pink-pastel text-neutral-600 hover:text-brand-pink-dark px-3 py-1.5 rounded-xl font-semibold transition-all"
                          >
                            {kw}
                          </button>
                        ))}
                      </div>
                    </div>
                  ) : (
                    <>
                      {/* Keyword suggestions */}
                      {searchResults.keywords.length > 0 && (
                        <div className="space-y-2">
                          <p className="font-bold text-neutral-400">💡 Gợi ý chủ đề liên quan</p>
                          <div className="flex flex-wrap gap-2">
                            {searchResults.keywords.map((kw, idx) => (
                              <button 
                                key={idx}
                                onClick={() => handleQuickSearchKeyword(kw)}
                                className="bg-brand-pink-light/30 border border-brand-pink-pastel/20 text-brand-pink-dark px-2.5 py-1 rounded-lg text-xs font-bold"
                              >
                                {kw}
                              </button>
                            ))}
                          </div>
                        </div>
                      )}

                      {/* Matched articles */}
                      {searchResults.articles.length > 0 && (
                        <div className="space-y-2">
                          <p className="font-bold text-brand-pink-dark">📚 Bài viết cẩm nang ({searchResults.articles.length})</p>
                          <div className="space-y-1.5">
                            {searchResults.articles.map((art) => (
                              <div 
                                key={art.id}
                                onClick={() => { viewArticleDetail(art); setShowSearchModal(false); }}
                                className="p-2.5 rounded-xl hover:bg-neutral-50 border border-transparent hover:border-neutral-100 cursor-pointer flex items-center justify-between"
                              >
                                <span className="font-bold text-neutral-700 text-xs md:text-sm line-clamp-1">{art.title}</span>
                                <span className="text-[10px] bg-brand-pink-light text-brand-pink-dark px-2 py-0.5 rounded-full">{art.category}</span>
                              </div>
                            ))}
                          </div>
                        </div>
                      )}

                      {/* Matched community posts */}
                      {searchResults.posts.length > 0 && (
                        <div className="space-y-2">
                          <p className="font-bold text-indigo-600">💬 Câu hỏi diễn đàn ({searchResults.posts.length})</p>
                          <div className="space-y-1.5">
                            {searchResults.posts.map((post) => (
                              <div 
                                key={post.id}
                                onClick={() => { setActivePost(post); setCurrentTab('community'); setShowSearchModal(false); }}
                                className="p-2.5 rounded-xl hover:bg-neutral-50 border border-transparent hover:border-neutral-100 cursor-pointer flex items-center justify-between"
                              >
                                <span className="font-bold text-neutral-700 text-xs md:text-sm line-clamp-1">{post.title}</span>
                                <span className="text-[10px] bg-indigo-50 text-indigo-600 px-2 py-0.5 rounded-full">Forum</span>
                              </div>
                            ))}
                          </div>
                        </div>
                      )}

                      {searchResults.articles.length === 0 && searchResults.posts.length === 0 && (
                        <p className="text-neutral-400 text-xs text-center py-6">Không tìm thấy kết quả. Thử hỏi Trợ lý AI hoặc đăng bài viết hỏi đáp ngay!</p>
                      )}
                    </>
                  )}
                </div>
              </div>
            </div>
          )}

          {/* FOOTER AREA */}
          <footer className="bg-neutral-900 text-neutral-400 pt-16 pb-8 border-t border-neutral-800 text-left text-xs md:text-sm">
            <div className="max-w-7xl mx-auto px-4 md:px-6 grid grid-cols-1 md:grid-cols-4 gap-8">
              
              {/* Col 1 Brand details */}
              <div className="space-y-4">
                <div className="flex items-center gap-2">
                  <span className="w-9 h-9 bg-brand-pink-dark rounded-xl flex items-center justify-center text-white text-xl">👶</span>
                  <span className="font-extrabold text-white text-base font-sans">
                    Mẹ Bỉm <span className="text-brand-pink-dark">Thông Thái</span>
                  </span>
                </div>
                <p className="text-neutral-500 leading-relaxed text-xs">
                  Cẩm nang số hóa nuôi dạy con chuẩn khoa học nhi khoa Việt Nam kết hợp diễn đàn đồng hành và thấu cảm.
                </p>
              </div>

              {/* Col 2 Quick links */}
              <div className="space-y-3">
                <h4 className="font-bold text-white text-sm">Chuyên mục chính</h4>
                <ul className="space-y-2 text-neutral-500 text-xs">
                  <li><button onClick={() => { setSelectedCategory('Trẻ sơ sinh'); setCurrentTab('articles'); }} className="hover:text-white">👶 Chăm sóc trẻ sơ sinh</button></li>
                  <li><button onClick={() => { setSelectedCategory('Dinh dưỡng cho bé'); setCurrentTab('articles'); }} className="hover:text-white">🥦 Thực đơn ăn dặm & sữa</button></li>
                  <li><button onClick={() => { setSelectedCategory('Giấc ngủ'); setCurrentTab('articles'); }} className="hover:text-white">🌙 Luyện tự ngủ khoa học</button></li>
                  <li><button onClick={() => { setSelectedCategory('Sức khỏe trẻ em'); setCurrentTab('articles'); }} className="hover:text-white">🩺 Xử lý bệnh thường gặp</button></li>
                </ul>
              </div>

              {/* Col 3 Policy & Support */}
              <div className="space-y-3">
                <h4 className="font-bold text-white text-sm">Chính sách & Hỗ trợ</h4>
                <ul className="space-y-2 text-neutral-500 text-xs">
                  <li><button onClick={() => setCurrentTab('about')} className="hover:text-white">🏵️ Về chúng tôi</button></li>
                  <li><button onClick={() => setCurrentTab('privacy')} className="hover:text-white">🔒 Chính sách bảo mật</button></li>
                  <li><button onClick={() => setCurrentTab('terms')} className="hover:text-white">⚖️ Điều khoản sử dụng</button></li>
                </ul>
              </div>

              {/* Col 4 Disclaimer */}
              <div className="space-y-3">
                <h4 className="font-bold text-white text-sm">Miễn trừ trách nhiệm</h4>
                <p className="text-neutral-500 leading-relaxed text-xs">
                  Mọi thông tin trên website chỉ mang tính chất tham khảo chung. Nó không thay thế bất kỳ chẩn đoán hoặc đơn thuốc của bác sĩ y khoa.
                </p>
                <div className="flex items-center gap-1.5 text-[10px] text-brand-pink-pastel font-bold bg-neutral-800 p-2 rounded-lg border border-neutral-700">
                  🛡️ BẢO VỆ SỨC KHỎE BÉ YÊU 100%
                </div>
              </div>

            </div>

            <hr className="border-neutral-800 my-8 max-w-7xl mx-auto" />

            <div className="max-w-7xl mx-auto px-4 md:px-6 flex flex-col md:flex-row items-center justify-between gap-4 text-xs text-neutral-500 text-center md:text-left">
              <div className="flex flex-col md:flex-row items-center gap-3">
                <p>© 2026 Mẹ Bỉm Thông Thái. Phát triển với trọn vẹn tình yêu thương dành cho thế hệ mầm non Việt Nam.</p>
              </div>
              <p>Mã nguồn dự án startup đã sẵn sàng production-ready.</p>
            </div>
          </footer>

        </div>
      );
    }

    // Render the React application to the root container
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
